<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay</title>
    <style>
        @font-face {
            font-family: 'DMSans';
            src: url('/fonts/DMSans.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        .overlay-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .zone {
            position: absolute;
            pointer-events: none;
            border: 2px solid;
        }
        .zone-edge {
            background: rgba(0, 200, 255, 0.3);
            border-color: rgba(0, 200, 255, 0.8);
        }
        .zone-corner {
            background: rgba(255, 80, 80, 0.4);
            border-color: rgba(255, 80, 80, 0.9);
        }
        .zone-custom {
            background: rgba(255, 196, 0, 0.18);
            border-color: rgba(255, 196, 0, 0.92);
            border-style: dashed;
        }
        .zone-disabled {
            background: rgba(128, 128, 128, 0.15);
            border-color: rgba(128, 128, 128, 0.5);
            border-style: dashed;
        }
        .zone-monitor {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.28);
            border-style: solid;
        }
        #overlay-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .sequence-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.86);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.28), 0 6px 18px rgba(0, 0, 0, 0.35);
            pointer-events: none;
        }
        .overlay-prompt {
            position: absolute;
            max-width: 260px;
            padding: 9px 11px;
            border-radius: 8px;
            background: rgb(12, 12, 14);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.36);
            color: rgba(255, 255, 255, 0.92);
            font: 600 13px/1.32 "DMSans", "Segoe UI", sans-serif;
            pointer-events: none;
            opacity: 0;
            transform: translate(18px, 18px);
            transition: opacity 120ms ease;
        }
        .overlay-prompt.active {
            opacity: 1;
        }
        .status-indicator {
            position: absolute;
            left: 20px;
            top: 20px;
            z-index: 999999;
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.28);
            pointer-events: none;
            background: #ff3b30;
            transition: background-color 120ms ease;
        }
        .status-indicator.enabled {
            background: #22c55e;
        }
        .overlay-prompt span {
            display: block;
            color: rgba(255, 255, 255, 0.66);
            font-weight: 500;
            margin-top: 3px;
        }
        .zone-drawing-preview {
            background: rgba(34, 197, 94, 0.14);
            border-color: rgba(34, 197, 94, 0.95);
            border-style: dashed;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .fade-out {
            animation: fadeOut 5s ease forwards;
        }
    </style>
</head>
<body>
    <div id="overlay-container">
        <div id="zone-layer" class="overlay-layer"></div>
        <div id="sequence-layer" class="overlay-layer"></div>
        <div id="pick-prompt" class="overlay-prompt">
            Right click to add point.
            <span>Shift + right click to add multiple.</span>
            <span>Ctrl + right click to delete a point.</span>
            <span>Esc to cancel.</span>
        </div>
        <div id="stop-zone-prompt" class="overlay-prompt">
            Right click and drag to draw stop zone.
            <span>Release to save.</span>
            <span>Esc to cancel.</span>
        </div>
        <div id="status-indicator" class="status-indicator enabled"></div>
    </div>

    <script>
        const zoneLayer = document.getElementById('zone-layer');
        const sequenceLayer = document.getElementById('sequence-layer');
        const pickPrompt = document.getElementById('pick-prompt');
        const stopZonePrompt = document.getElementById('stop-zone-prompt');
        let pickModeActive = false;
        let stopZonePickModeActive = false;

        function setupTauriListener() {
            if (!window.__TAURI__ || !window.__TAURI__.event) {
                console.log('[Overlay] Tauri not ready, retrying...');
                setTimeout(setupTauriListener, 200);
                return;
            }

            window.__TAURI__.event.listen('zone-data', (event) => {
                renderZones(event.payload);
            });

            window.__TAURI__.event.listen('clear-zones', () => {
                zoneLayer.innerHTML = '';
                zoneLayer.classList.remove('fade-out');
            });

            window.__TAURI__.event.listen('sequence-points-data', (event) => {
                renderSequencePoints(event.payload);
            });

            window.__TAURI__.event.listen('sequence-pick-mode', (event) => {
                setPickMode(Boolean(event.payload && event.payload.active));
            });

            window.__TAURI__.event.listen('sequence-pick-cursor', (event) => {
                updatePickPrompt(event.payload);
            });

            window.__TAURI__.event.listen('custom-stop-zone-pick-mode', (event) => {
                setStopZonePickMode(Boolean(event.payload && event.payload.active));
            });

            window.__TAURI__.event.listen('custom-stop-zone-preview', (event) => {
                renderStopZonePreview(event.payload);
            });

            window.__TAURI__.event.listen('custom-stop-zone-clear-preview', () => {
                clearStopZonePreview();
            });

            window.__TAURI__.event.listen('status-indicator', (event) => {
                updateStatusIndicator(event.payload);
            });

            console.log('[Overlay] Event listeners registered');
        }

        function updateStatusIndicator(payload) {
            const indicator = document.getElementById('status-indicator');
            if (!indicator) return;
            const enabled = Boolean(payload && payload.enabled);
            indicator.classList.toggle('enabled', enabled);
        }

        function renderZones(data) {
            zoneLayer.innerHTML = '';
            zoneLayer.classList.remove('fade-out');
            void zoneLayer.offsetWidth;
            if (!stopZonePickModeActive) {
                zoneLayer.classList.add('fade-out');
            }

            if (!data) return;

            const sw = data.screenWidth;
            const sh = data.screenHeight;
            const monitors = Array.isArray(data.monitors) && data.monitors.length > 0
                ? data.monitors
                : [{ x: 0, y: 0, width: sw, height: sh }];

            for (const monitor of monitors) {
                addZone(monitor.x, monitor.y, monitor.width, monitor.height, 'zone-monitor');
            }

            if (data.customStopZoneEnabled && data.customStopZone) {
                addZone(
                    data.customStopZone.x,
                    data.customStopZone.y,
                    data.customStopZone.width,
                    data.customStopZone.height,
                    'zone-custom'
                );
            }

            for (const monitor of monitors) {
                renderMonitorZones(monitor, data);
            }
        }

        function renderMonitorZones(monitor, data) {
            if (data.edgeStopEnabled) {
                const cTL = data.cornerStopEnabled ? data.cornerStopTL : 0;
                const cTR = data.cornerStopEnabled ? data.cornerStopTR : 0;
                const cBL = data.cornerStopEnabled ? data.cornerStopBL : 0;
                const cBR = data.cornerStopEnabled ? data.cornerStopBR : 0;

                addZone(
                    monitor.x + cTL,
                    monitor.y,
                    monitor.width - cTL - cTR,
                    data.edgeStopTop,
                    'zone-edge'
                );
                addZone(
                    monitor.x + cBL,
                    monitor.y + monitor.height - data.edgeStopBottom,
                    monitor.width - cBL - cBR,
                    data.edgeStopBottom,
                    'zone-edge'
                );
                addZone(
                    monitor.x,
                    monitor.y + cTL,
                    data.edgeStopLeft,
                    monitor.height - cTL - cBL,
                    'zone-edge'
                );
                addZone(
                    monitor.x + monitor.width - data.edgeStopRight,
                    monitor.y + cTR,
                    data.edgeStopRight,
                    monitor.height - cTR - cBR,
                    'zone-edge'
                );
            }

            if (data.cornerStopEnabled) {
                addZone(monitor.x, monitor.y, data.cornerStopTL, data.cornerStopTL, 'zone-corner');
                addZone(
                    monitor.x + monitor.width - data.cornerStopTR,
                    monitor.y,
                    data.cornerStopTR,
                    data.cornerStopTR,
                    'zone-corner'
                );
                addZone(
                    monitor.x,
                    monitor.y + monitor.height - data.cornerStopBL,
                    data.cornerStopBL,
                    data.cornerStopBL,
                    'zone-corner'
                );
                addZone(
                    monitor.x + monitor.width - data.cornerStopBR,
                    monitor.y + monitor.height - data.cornerStopBR,
                    data.cornerStopBR,
                    data.cornerStopBR,
                    'zone-corner'
                );
            }
        }

        function addZone(x, y, w, h, cls) {
            const scale = window.devicePixelRatio || 1;
            x = x / scale;
            y = y / scale;
            w = w / scale;
            h = h / scale;
            
            if (w <= 0 || h <= 0) return null;
            const div = document.createElement('div');
            div.className = 'zone ' + cls;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            zoneLayer.appendChild(div);
            return div;
        }

        function renderStopZonePreview(data) {
            if (!data || !stopZonePickModeActive) return;

            if (
                Number.isFinite(data.x) &&
                Number.isFinite(data.y) &&
                Number.isFinite(data.width) &&
                Number.isFinite(data.height)
            ) {
                const existing = document.getElementById('stop-zone-preview');
                if (existing) existing.remove();
                const preview = addZone(data.x, data.y, data.width, data.height, 'zone-drawing-preview');
                if (preview) preview.id = 'stop-zone-preview';
            }

            if (Number.isFinite(data.cursorX) && Number.isFinite(data.cursorY)) {
                updateFloatingPrompt(stopZonePrompt, data.cursorX, data.cursorY);
            }
        }

        function clearStopZonePreview() {
            const existing = document.getElementById('stop-zone-preview');
            if (existing) existing.remove();
            stopZonePrompt.classList.remove('active');
        }

        function renderSequencePoints(data) {
            sequenceLayer.innerHTML = '';
            sequenceLayer.classList.remove('fade-out');

            if (!data || !Array.isArray(data.points)) return;

            for (let index = 0; index < data.points.length; index += 1) {
                const point = data.points[index];
                addSequenceDot(point, index);
            }

            if (!data.persistent && !pickModeActive) {
                void sequenceLayer.offsetWidth;
                sequenceLayer.classList.add('fade-out');
            }
        }

        function addSequenceDot(point, index) {
            const scale = window.devicePixelRatio || 1;
            const dot = document.createElement('div');
            dot.className = 'sequence-dot';
            dot.style.left = (point.x / scale - 5) + 'px';
            dot.style.top = (point.y / scale - 5) + 'px';
            dot.style.background = stableDotColor(point, index);
            sequenceLayer.appendChild(dot);
        }

        function stableDotColor(point, index) {
            const key = point.id || `${index}:${point.x}:${point.y}`;
            let hash = 0;

            for (let i = 0; i < key.length; i += 1) {
                hash = ((hash << 5) - hash + key.charCodeAt(i)) | 0;
            }

            const hue = Math.abs(hash) % 360;
            return `hsl(${hue} 84% 58%)`;
        }

        function setPickMode(active) {
            pickModeActive = active;
            pickPrompt.classList.toggle('active', active);
            if (active) {
                sequenceLayer.classList.remove('fade-out');
            }
        }

        function setStopZonePickMode(active) {
            stopZonePickModeActive = active;
            stopZonePrompt.classList.toggle('active', active);
            if (active) {
                zoneLayer.classList.remove('fade-out');
            } else {
                clearStopZonePreview();
            }
        }

        function updatePickPrompt(point) {
            if (!point || !pickModeActive) return;

            updateFloatingPrompt(pickPrompt, point.x, point.y);
        }

        function updateFloatingPrompt(prompt, rawX, rawY) {
            const scale = window.devicePixelRatio || 1;
            const gap = 18;
            const x = rawX / scale + gap;
            const y = rawY / scale + gap;
            const maxX = Math.max(0, window.innerWidth - prompt.offsetWidth - 8);
            const maxY = Math.max(0, window.innerHeight - prompt.offsetHeight - 8);

            prompt.style.left = Math.min(Math.max(8, x), maxX) + 'px';
            prompt.style.top = Math.min(Math.max(8, y), maxY) + 'px';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupTauriListener);
        } else {
            setupTauriListener();
        }
    </script>
</body>
</html>
